services:

  db:
    image: postgres:13
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${TEST_USER}
      POSTGRES_PASSWORD: ${TEST_PASSWORD}
      POSTGRES_DB: ${TEST_DB}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TEST_USER} -d ${TEST_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  db_data:
